<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4年生算数テスト</title>
    <style>
      :root {
        --paper: #fffdf7;
        --ink: #223;
        --accent: #2f6fdb;
        --accent-soft: #e8f0ff;
        --correct: #1f9d4f;
        --wrong: #d94242;
        --line: #d7d3c5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
        background: linear-gradient(135deg, #f2f7ff 0%, #f8f2e8 100%);
        color: var(--ink);
        min-height: 100vh;
      }
      .page { max-width: 980px; margin: 0 auto; padding: 18px; }
      .paper {
        background: var(--paper);
        border: 2px solid var(--line);
        box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        border-radius: 18px;
        padding: 24px;
      }
      .header { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
      h1 { margin:0; font-size:clamp(1.5rem, 2.6vw, 2.2rem); }
      .subtitle { margin:0; font-size:1rem; color:#556; }
      .top-panel { display:grid; gap:12px; margin-bottom:16px; padding:12px; border:1px solid var(--line); border-radius:14px; background:#fcfbf5; }
      .student-info { display:flex; flex-wrap:wrap; gap:12px; align-items:end; }
      .field { display:flex; flex-direction:column; gap:6px; font-size:0.95rem; font-weight:700; }
      .field input, .field select { min-width: 140px; padding:10px 12px; border:1px solid #cfd6e1; border-radius:10px; font-size:1rem; }
      .controls { display:flex; flex-wrap:wrap; gap:10px; }
      .toggle-btn, .primary-btn, .secondary-btn, .print-btn { border:none; border-radius:999px; padding:10px 16px; font-size:1rem; cursor:pointer; transition:transform 0.2s ease, box-shadow 0.2s ease; }
      .primary-btn { background:var(--accent); color:white; font-weight:700; }
      .secondary-btn { background:#f2efe6; color:var(--ink); }
      .toggle-btn { background:#eef2f7; color:var(--ink); }
      .toggle-btn.active { background:var(--accent); color:white; }
      .print-btn { background:#8a4b00; color:white; }
      .toggle-btn:hover, .primary-btn:hover, .secondary-btn:hover, .print-btn:hover { transform:translateY(-1px); box-shadow:0 6px 14px rgba(0,0,0,0.12); }
      .status-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:16px; padding:12px 14px; background:var(--accent-soft); border-radius:12px; }
      .question-box { padding:18px 0 6px; }
      .question-text { font-size:clamp(1.2rem, 2vw, 1.7rem); line-height:1.6; font-weight:700; margin-bottom:14px; }
      .answer-row { display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-top:8px; }
      .answer-input { width:min(240px, 100%); padding:12px 14px; font-size:1.2rem; border:2px solid #cfd6e1; border-radius:999px; outline:none; }
      .answer-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(47,111,219,0.15); }
      .answer-input.wrong { border-color:var(--wrong); box-shadow:0 0 0 3px rgba(217,66,66,0.16); }
      .answer-input.correct { border-color:var(--correct); box-shadow:0 0 0 3px rgba(31,157,79,0.16); }
      .feedback { margin-top:16px; padding:14px 16px; border-radius:14px; font-size:1.05rem; line-height:1.6; }
      .feedback.correct { background:#eaf9ef; color:#17673a; }
      .feedback.wrong { background:#fff0f0; color:#8f2424; }
      .circle-mark { display:inline-flex; width:1.4rem; height:1.4rem; line-height:1.4rem; justify-content:center; align-items:center; border-radius:50%; margin-right:0.35rem; font-weight:900; vertical-align:middle; }
      .circle-mark.correct { background:var(--correct); color:white; }
      .circle-mark.wrong { background:var(--wrong); color:white; }
      .result-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; font-weight:700; margin-top:8px; border:2px solid; }
      .result-badge.wrong { border-color:var(--wrong); background:#fff4f4; color:var(--wrong); }
      .result-badge.correct { border-color:var(--correct); background:#f1fff7; color:var(--correct); }
      .result-panel { display:none; margin-top:10px; }
      .score-box { font-size:clamp(1.35rem, 2vw, 1.8rem); font-weight:800; margin-bottom:10px; }
      .summary-list { display:grid; gap:10px; margin-top:16px; }
      .summary-item { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:#fcfbf5; border:1px solid var(--line); }
      .summary-item .left { display:flex; align-items:center; gap:10px; flex:1; }
      .summary-item .right { font-weight:700; }
      .hidden { display:none !important; }
      .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
      .confetti-piece { position:absolute; top:-12px; width:10px; height:18px; border-radius:3px; opacity:0.9; animation:fall linear forwards; }
      @keyframes fall { 0% { transform:translate3d(0,0,0) rotate(0deg); opacity:1; } 100% { transform:translate3d(var(--drift), 110vh, 0) rotate(720deg); opacity:0; } }
      @media (max-width:700px) {
        .page { padding:10px; }
        .paper { padding:16px; }
        .header { align-items:flex-start; }
        .student-info { flex-direction:column; align-items:stretch; }
        .field input, .field select { width:100%; }
        .status-bar { flex-direction:column; align-items:flex-start; }
        .answer-row { flex-direction:column; align-items:stretch; }
        .answer-input { width:100%; }
        .summary-item { flex-direction:column; align-items:flex-start; }
      }
      @media print {
        body { background:white; }
        .page { max-width:none; padding:0; }
        .paper { box-shadow:none; border:none; border-radius:0; padding:20px; }
        .no-print { display:none !important; }
        .summary-item { break-inside:avoid; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="paper">
        <div class="header">
          <div>
            <h1>4年生算数テスト</h1>
            <p class="subtitle">名前：＿＿＿＿＿＿　　日付：＿＿＿＿＿＿</p>
          </div>
          <div class="controls no-print">
            <button class="primary-btn" id="start-btn" type="button">はじめから</button>
            <button class="toggle-btn" id="sound-toggle" type="button">🔊 効果音：ON</button>
            <button class="toggle-btn" id="time-toggle" type="button">⏱ 制限時間：ON</button>
          </div>
        </div>

        <div class="top-panel no-print">
          <div class="student-info">
            <label class="field">お名前<input id="name-input" type="text" placeholder="例：山田太郎" autocomplete="name" /></label>
            <label class="field">学年<select id="grade-select">
              <option value="1">小学1年</option>
              <option value="2">小学2年</option>
              <option value="3">小学3年</option>
              <option value="4" selected>小学4年</option>
              <option value="5">小学5年</option>
              <option value="6">小学6年</option>
            </select></label>
            <label class="field">問題数<select id="question-count-select">
              <option value="10">10問</option>
              <option value="20" selected>20問</option>
              <option value="50">50問</option>
            </select></label>
          </div>
        </div>

        <div class="status-bar">
          <div id="progress-text">問題 1 / 20</div>
          <div id="timer-text">残り時間：15秒</div>
        </div>

        <section id="quiz-panel">
          <div class="question-box">
            <div class="question-text" id="question-text">問題を読み込んでいます…</div>
            <div class="answer-row">
              <input class="answer-input" id="answer-input" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="答えを入力" />
              <button class="primary-btn" id="action-btn" type="button">解答する</button>
            </div>
            <div class="feedback hidden" id="feedback"></div>
          </div>
        </section>

        <section id="result-panel" class="result-panel">
          <div class="score-box" id="score-box">結果を表示します</div>
          <div id="result-summary"></div>
          <div class="controls" style="margin-top: 16px;">
            <button class="primary-btn" id="retry-btn" type="button">もう一度</button>
            <button class="secondary-btn" id="mistake-btn" type="button">間違えた問題だけ復習</button>
            <button class="print-btn" id="print-btn" type="button">印刷する</button>
          </div>
        </section>
      </div>
    </div>

    <div class="confetti hidden" id="confetti"></div>

    <script>
      (() => {
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const actionBtn = document.getElementById('action-btn');
        const feedbackEl = document.getElementById('feedback');
        const progressText = document.getElementById('progress-text');
        const timerText = document.getElementById('timer-text');
        const quizPanel = document.getElementById('quiz-panel');
        const resultPanel = document.getElementById('result-panel');
        const scoreBox = document.getElementById('score-box');
        const resultSummary = document.getElementById('result-summary');
        const soundToggle = document.getElementById('sound-toggle');
        const timeToggle = document.getElementById('time-toggle');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const mistakeBtn = document.getElementById('mistake-btn');
        const printBtn = document.getElementById('print-btn');
        const confettiEl = document.getElementById('confetti');
        const gradeSelect = document.getElementById('grade-select');
        const questionCountSelect = document.getElementById('question-count-select');
        const nameInput = document.getElementById('name-input');

        const state = {
          questions: [],
          currentIndex: 0,
          soundOn: true,
          timeLimitOn: true,
          timeLimitSec: 15,
          timerId: null,
          startedAt: null,
          finished: false,
          grade: 4,
          questionCount: 20,
        };

        function getGradeConfig(grade) {
          switch (Number(grade)) {
            case 1:
              return { ops: ['+','-'], max: 20, maxMul: 9, allowDivision: false };
            case 2:
              return { ops: ['+','-'], max: 99, maxMul: 9, allowDivision: false };
            case 3:
              return { ops: ['+','-','×','÷'], max: 99, maxMul: 12, allowDivision: true };
            case 4:
              return { ops: ['+','-','×','÷'], max: 999, maxMul: 12, allowDivision: true };
            case 5:
              return { ops: ['+','-','×','÷'], max: 999, maxMul: 15, allowDivision: true };
            case 6:
            default:
              return { ops: ['+','-','×','÷'], max: 9999, maxMul: 18, allowDivision: true };
          }
        }

        function generateQuestions(count = 20) {
          const config = getGradeConfig(state.grade);
          const questions = [];
          for (let i = 0; i < count; i += 1) {
            const operator = config.ops[Math.floor(Math.random() * config.ops.length)];
            let prompt = '';
            let answer = 0;
            if (operator === '+') {
              const a = Math.floor(Math.random() * (config.max - 1)) + 1;
              const b = Math.floor(Math.random() * (config.max - 1)) + 1;
              prompt = `${a} + ${b} = ?`;
              answer = a + b;
            } else if (operator === '-') {
              const a = Math.floor(Math.random() * config.max) + 1;
              const b = Math.floor(Math.random() * config.max) + 1;
              const larger = Math.max(a, b);
              const smaller = Math.min(a, b);
              prompt = `${larger} - ${smaller} = ?`;
              answer = larger - smaller;
            } else if (operator === '×') {
              const a = Math.floor(Math.random() * config.maxMul) + 1;
              const b = Math.floor(Math.random() * config.maxMul) + 1;
              prompt = `${a} × ${b} = ?`;
              answer = a * b;
            } else {
              const divisor = Math.floor(Math.random() * Math.min(config.maxMul, 9)) + 1;
              const quotient = Math.floor(Math.random() * Math.min(config.maxMul, 9)) + 1;
              const dividend = quotient * divisor;
              prompt = `${dividend} ÷ ${divisor} = ?`;
              answer = quotient;
            }
            questions.push({ prompt, answer, userAnswer: '', submitted: false, correct: false });
          }
          return questions;
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function updateToggleButtons() {
          soundToggle.textContent = `🔊 効果音：${state.soundOn ? 'ON' : 'OFF'}`;
          soundToggle.classList.toggle('active', state.soundOn);
          timeToggle.textContent = `⏱ 制限時間：${state.timeLimitOn ? 'ON' : 'OFF'}`;
          timeToggle.classList.toggle('active', state.timeLimitOn);
        }

        function clearTimer() {
          if (state.timerId) {
            clearInterval(state.timerId);
            state.timerId = null;
          }
        }

        function startTimer() {
          clearTimer();
          if (!state.timeLimitOn || state.finished) {
            timerText.textContent = '残り時間：なし';
            return;
          }
          let remaining = state.timeLimitSec;
          timerText.textContent = `残り時間：${remaining}秒`;
          state.timerId = setInterval(() => {
            remaining -= 1;
            timerText.textContent = `残り時間：${remaining}秒`;
            if (remaining <= 0) {
              clearTimer();
              submitAnswer({ timedOut: true });
            }
          }, 1000);
        }

        function playSound(correct) {
          if (!state.soundOn) return;
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor || !window.isSecureContext) return;
          try {
            const audioContext = new AudioCtor();
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.type = correct ? 'triangle' : 'sine';
            oscillator.frequency.setValueAtTime(correct ? 880 : 220, audioContext.currentTime);
            gain.gain.setValueAtTime(0.12, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.25);
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.25);
          } catch (error) {}
        }

        function renderQuestion() {
          const current = state.questions[state.currentIndex];
          if (!current) return;
          quizPanel.classList.remove('hidden');
          resultPanel.classList.add('hidden');
          confettiEl.classList.add('hidden');
          confettiEl.innerHTML = '';
          questionText.textContent = `${state.currentIndex + 1}. ${current.prompt}`;
          progressText.textContent = `問題 ${state.currentIndex + 1} / ${state.questions.length}`;
          answerInput.value = current.userAnswer;
          answerInput.classList.remove('correct', 'wrong');
          feedbackEl.classList.add('hidden');
          feedbackEl.innerHTML = '';
          actionBtn.textContent = current.submitted ? '次へ' : '解答する';
          if (state.timeLimitOn && !current.submitted) {
            startTimer();
          } else {
            clearTimer();
            timerText.textContent = '残り時間：なし';
          }
          answerInput.focus();
        }

        function submitAnswer({ timedOut = false } = {}) {
          const current = state.questions[state.currentIndex];
          if (!current || current.submitted) return;
          clearTimer();
          const userValue = answerInput.value.trim();
          current.userAnswer = userValue;
          const normalizedUser = userValue.replace(/[^0-9-]/g, '');
          const normalizedCorrect = String(current.answer);
          const isCorrect = normalizedUser === normalizedCorrect;
          current.submitted = true;
          current.correct = isCorrect;
          answerInput.classList.toggle('correct', isCorrect);
          answerInput.classList.toggle('wrong', !isCorrect);
          const statusClass = isCorrect ? 'correct' : 'wrong';
          const statusMark = `<span class="circle-mark ${statusClass}">${isCorrect ? '○' : '×'}</span>`;
          const userBadge = `<span class="result-badge ${statusClass}"><span class="circle-mark ${statusClass}">${statusClass === 'correct' ? '○' : '×'}</span>あなたの答え：${escapeHtml(userValue || '（無回答）')}</span>`;
          const correctBadge = `<div class="result-badge correct"><span class="circle-mark correct">○</span>正解：${escapeHtml(current.answer)}</div>`;
          feedbackEl.className = `feedback ${statusClass}`;
          feedbackEl.innerHTML = `${statusMark}${timedOut ? '時間切れです。' : isCorrect ? '正解です。' : '不正解です。'}<br>${userBadge}<br>${correctBadge}`;
          feedbackEl.classList.remove('hidden');
          playSound(isCorrect);
          actionBtn.textContent = '次へ';
        }

        function goToNextQuestion() {
          const current = state.questions[state.currentIndex];
          if (!current) return;
          if (!current.submitted) {
            submitAnswer();
            return;
          }
          if (state.currentIndex < state.questions.length - 1) {
            state.currentIndex += 1;
            renderQuestion();
          } else {
            finishTest();
          }
        }

        function finishTest() {
          state.finished = true;
          clearTimer();
          const total = state.questions.length;
          const correctCount = state.questions.filter((q) => q.correct).length;
          const score = Math.round((correctCount / total) * 100);
          const rate = Math.round((correctCount / total) * 100);
          const elapsedSeconds = Math.floor((Date.now() - state.startedAt) / 1000);
          const minutes = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
          const seconds = String(elapsedSeconds % 60).padStart(2, '0');
          const studentName = (nameInput.value || 'お名前').trim() || 'お名前';
          scoreBox.innerHTML = `点数：<span style="color:${score === 100 ? 'var(--correct)' : 'var(--accent)'};">${score} / 100</span>`;
          resultSummary.innerHTML = `
            <div><strong>${escapeHtml(studentName)}さん</strong></div>
            <div>学年：小学${state.grade}年</div>
            <div>問題数：${state.questionCount}問</div>
            <div>正答数：${correctCount} / ${total}</div>
            <div>正答率：${rate}%</div>
            <div>かかった時間：${minutes}分${seconds}秒</div>
          `;
          const summaryList = document.createElement('div');
          summaryList.className = 'summary-list';
          state.questions.forEach((q, index) => {
            const item = document.createElement('div');
            item.className = 'summary-item';
            item.innerHTML = `
              <div class="left">
                <span class="circle-mark ${q.correct ? 'correct' : 'wrong'}">${q.correct ? '○' : '×'}</span>
                <span>${index + 1}. ${escapeHtml(q.prompt)} </span>
              </div>
              <div class="right">${q.correct ? '正解' : `正解：${q.answer}`}</div>
            `;
            summaryList.appendChild(item);
          });
          resultSummary.appendChild(summaryList);
          quizPanel.classList.add('hidden');
          resultPanel.classList.remove('hidden');
          if (score === 100) {
            startConfetti();
          } else {
            confettiEl.classList.add('hidden');
            confettiEl.innerHTML = '';
          }
        }

        function startConfetti() {
          confettiEl.classList.remove('hidden');
          confettiEl.innerHTML = '';
          const colors = ['#ff6b6b', '#ffd166', '#06d6a0', '#118ab2', '#9b5de5'];
          for (let i = 0; i < 90; i += 1) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = `${Math.random() * 100}vw`;
            piece.style.background = colors[Math.floor(Math.random() * colors.length)];
            piece.style.setProperty('--drift', `${(Math.random() - 0.5) * 120}vw`);
            piece.style.animationDuration = `${2.2 + Math.random() * 2.8}s`;
            piece.style.animationDelay = `${Math.random() * 0.3}s`;
            confettiEl.appendChild(piece);
          }
        }

        function startNewTest() {
          state.grade = Number(gradeSelect.value);
          state.questionCount = Number(questionCountSelect.value);
          state.questions = generateQuestions(state.questionCount);
          state.currentIndex = 0;
          state.finished = false;
          state.startedAt = Date.now();
          resultSummary.innerHTML = '';
          renderQuestion();
        }

        function startWithMistakes() {
          const mistakes = state.questions.filter((q) => !q.correct);
          if (mistakes.length === 0) {
            alert('間違えた問題はありません。');
            return;
          }
          state.questions = mistakes.map((q) => ({ ...q, userAnswer: '', submitted: false, correct: false }));
          state.currentIndex = 0;
          state.finished = false;
          state.startedAt = Date.now();
          resultSummary.innerHTML = '';
          renderQuestion();
        }

        actionBtn.addEventListener('click', () => {
          if (state.finished) return;
          const current = state.questions[state.currentIndex];
          if (!current) return;
          if (!current.submitted) {
            submitAnswer();
          } else {
            goToNextQuestion();
          }
        });

        answerInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            actionBtn.click();
          }
        });

        startBtn.addEventListener('click', () => startNewTest());
        retryBtn.addEventListener('click', () => startNewTest());
        mistakeBtn.addEventListener('click', () => startWithMistakes());
        printBtn.addEventListener('click', () => window.print());
        soundToggle.addEventListener('click', () => {
          state.soundOn = !state.soundOn;
          updateToggleButtons();
        });
        timeToggle.addEventListener('click', () => {
          state.timeLimitOn = !state.timeLimitOn;
          updateToggleButtons();
          if (state.timeLimitOn) {
            startTimer();
          } else {
            clearTimer();
            timerText.textContent = '残り時間：なし';
          }
        });
        gradeSelect.addEventListener('change', () => startNewTest());
        questionCountSelect.addEventListener('change', () => startNewTest());
        nameInput.addEventListener('change', () => {
          const current = document.querySelector('.subtitle');
          if (current) {
            current.textContent = `名前：${escapeHtml(nameInput.value || '＿＿＿＿＿＿')}　　日付：＿＿＿＿＿＿`;
          }
        });

        updateToggleButtons();
        startNewTest();
      })();
    </script>
  </body>
</html>
